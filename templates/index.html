<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-neutral-100">
    <nav class="bg-neutral-900 border-b border-neutral-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold">User Management</h1>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats Card -->
        <div class="bg-neutral-900 border border-neutral-800 rounded-lg p-6 mb-8">
            <p class="text-neutral-400 text-sm">Total Users</p>
            <p class="text-4xl font-bold mt-2" id="userCount">0</p>
        </div>

        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-semibold">Users</h2>
            <button id="addUserBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium">
                Add User
            </button>
        </div>

        <!-- Users Table -->
        <div class="overflow-x-auto bg-neutral-900 border border-neutral-800 rounded-lg">
            <table class="w-full">
                <thead>
                    <tr class="border-b border-neutral-800">
                        <th class="px-6 py-4 text-left text-sm font-semibold text-neutral-300">Name</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-neutral-300">Email</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-neutral-300">Location</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-neutral-300">CV</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-neutral-300">Created</th>
                        <th class="px-6 py-4 text-left text-sm font-semibold text-neutral-300">Actions</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr class="border-t border-neutral-800">
                        <td colspan="6" class="px-6 py-8 text-center text-neutral-400">No users yet</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div id="userModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-neutral-900 border border-neutral-800 rounded-lg w-full max-w-md max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center p-6 border-b border-neutral-800">
                <h3 class="text-lg font-semibold" id="modalTitle">Add User</h3>
                <button id="closeModalBtn" class="text-neutral-400 hover:text-neutral-200">&times;</button>
            </div>
            <form id="userForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Name</label>
                    <input type="text" id="nameInput" required class="w-full bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-white placeholder-neutral-500 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="emailInput" required class="w-full bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-white placeholder-neutral-500 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Location</label>
                    <input type="text" id="locationInput" class="w-full bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-white placeholder-neutral-500 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Upload CV (PDF/DOC)</label>
                    <input type="file" id="cvInput" accept=".pdf,.doc,.docx" class="w-full bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" id="cancelBtn" class="flex-1 bg-neutral-800 hover:bg-neutral-700 text-white px-4 py-2 rounded-lg font-medium">
                        Cancel
                    </button>
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium">
                        Save
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Dialog -->
    <div id="deleteDialog" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-neutral-900 border border-neutral-800 rounded-lg p-6 w-full max-w-sm">
            <h3 class="text-lg font-semibold mb-2">Delete User</h3>
            <p class="text-neutral-400 mb-6">Are you sure you want to delete this user? This action cannot be undone.</p>
            <div class="flex gap-3">
                <button id="cancelDeleteBtn" class="flex-1 bg-neutral-800 hover:bg-neutral-700 text-white px-4 py-2 rounded-lg font-medium">
                    Cancel
                </button>
                <button id="confirmDeleteBtn" class="flex-1 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium">
                    Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="hidden fixed bottom-4 right-4 bg-neutral-800 border border-neutral-700 text-white px-6 py-3 rounded-lg shadow-lg z-40"></div>

    <script src="/static/app.js"></script>
</body>
</html>
